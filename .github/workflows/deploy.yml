name: Build and Deploy Satis to Pages

on:
  push:
    branches: [ "main" ]
  repository_dispatch:
    types: [ satis-update ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Satis
        run: composer create-project composer/satis:^2.0 --stability=dev --no-dev
        
      - name: Validate and Replace GitHub Token
        run: |
          if [ -z "${{ secrets.BOT_GITHUB_TOKEN }}" ]; then
            echo "❌ Error: BOT_GITHUB_TOKEN is not configured"
            exit 1
          fi
          
          sed -i "s/GITHUB_TOKEN_PLACEHOLDER/${{ secrets.BOT_GITHUB_TOKEN }}/g" satis.json
          
          if grep -q "GITHUB_TOKEN_PLACEHOLDER" satis.json; then
            echo "❌ Error: Token replacement failed"
            exit 1
          fi
        
      - name: Build Satis Repository
        env:
          COMPOSER_MEMORY_LIMIT: -1
        run: php satis/bin/satis build --no-ansi --verbose satis.json public/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4